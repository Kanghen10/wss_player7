<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CCTV Player</title>

<style>

html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

#video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

#loading{
position:absolute;
color:white;
font-family:Arial;
font-size:20px;
}

</style>
</head>

<body>

<div id="loading">Loading CCTV Stream...</div>

<video id="video" autoplay muted playsinline></video>

<script>

const video = document.getElementById("video")
const loading = document.getElementById("loading")

let mediaSource
let sourceBuffer
let websocket

let queue=[]
let streamingStarted=false
let reconnectDelay=5000

function startStream(url){

mediaSource = new MediaSource()

video.src = URL.createObjectURL(mediaSource)

mediaSource.addEventListener("sourceopen", ()=>{

connectWS(url)

})

}

function connectWS(url){

websocket = new WebSocket(url)
websocket.binaryType="arraybuffer"

websocket.onmessage = (event)=>{

const data = new Uint8Array(event.data)

if(data[0]===9){

const codec = new TextDecoder().decode(data.slice(1))

sourceBuffer = mediaSource.addSourceBuffer(`video/mp4; codecs="${codec}"`)
sourceBuffer.mode="segments"

sourceBuffer.addEventListener("updateend", appendQueue)

}else{

appendSegment(event.data)

}

}

websocket.onerror = reconnect
websocket.onclose = reconnect

}

function appendSegment(segment){

if(!streamingStarted){

sourceBuffer.appendBuffer(segment)
streamingStarted=true

}else{

queue.push(segment)
appendQueue()

}

}

function appendQueue(){

if(!sourceBuffer || sourceBuffer.updating) return

if(queue.length>0){

sourceBuffer.appendBuffer(queue.shift())

}

}

function reconnect(){

loading.innerText="Reconnecting..."

setTimeout(()=>{

location.reload()

}, reconnectDelay)

}

video.addEventListener("playing",()=>{

loading.style.display="none"

})

document.body.addEventListener("click",()=>{

if(!document.fullscreenElement){

document.documentElement.requestFullscreen()

}

})

const streamURL = location.hash.replace("#","")

if(streamURL){

startStream(streamURL)

}else{

loading.innerText="No stream URL"

}

</script>

</body>
</html>
