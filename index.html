<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WSS Player - CCTV Banyuwangi (WebSocket)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1c;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .player-container {
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(145deg, #141a2c 0%, #0e1322 100%);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .video-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .info-panel {
            padding: 20px 24px;
            background: rgba(15,25,50,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(59,130,246,0.3);
        }
        .stream-url {
            background: #0a0e1a;
            padding: 12px 16px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #60a5fa;
            border: 1px solid #1e2a4a;
            margin-bottom: 16px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #1e293b;
            border-radius: 40px;
            font-size: 13px;
            color: #94a3b8;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
            animation: pulse 1.5s infinite;
        }
        .status-dot.disconnected {
            background: #ef4444;
            box-shadow: none;
            animation: none;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        button {
            background: #1e293b;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #334155;
            transform: translateY(-1px);
        }
        button.primary {
            background: #3b82f6;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }
        button.primary:hover {
            background: #2563eb;
        }
        .error-message {
            background: rgba(239,68,68,0.15);
            border-left: 3px solid #ef4444;
            padding: 12px 16px;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 12px;
        }
        .camera-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }
        .camera-name small {
            font-size: 12px;
            font-weight: normal;
            color: #60a5fa;
            background: #1e2a4a;
            padding: 2px 10px;
            border-radius: 20px;
        }
        hr {
            border-color: #1e2a4a;
            margin: 12px 0;
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .info-panel { padding: 16px; }
        }
    </style>
    <!-- Library mpegts.js untuk decode MPEG-TS over WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>
<body>
<div class="player-container">
    <div class="video-wrapper">
        <video id="videoPlayer" controls autoplay playsinline muted></video>
    </div>
    <div class="info-panel">
        <div class="camera-name">
            📹 CCTV Banyuwangi
            <small id="cameraIdLabel">-</small>
        </div>
        <div class="stream-url" id="streamUrlDisplay">
            🔗 WebSocket URL
        </div>
        <div class="status">
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Menghubungkan WebSocket...</span>
            </div>
            <div class="status-badge">📡 MPEG-TS over WebSocket</div>
        </div>
        <div class="controls">
            <button id="reloadBtn" class="primary">🔄 Reload Stream</button>
        </div>
        <div id="errorPanel"></div>
        <hr>
        <div style="font-size: 12px; color: #64748b; text-align: center;">
            Format URL: <code>https://kanghen10.github.io/wss_player7/#CCTV349</code>
        </div>
    </div>
</div>

<script>
    // ================= AMBIL ID CCTV DARI HASH =================
    let hash = window.location.hash.substring(1);
    let cameraId = null;
    let wsUrl = null;

    function extractCameraId(input) {
        let match = input.match(/CCTV(\d+)/i);
        if (match) return match[1];
        match = input.match(/[?&]src=([^&]+)/i);
        if (match) {
            let src = match[1];
            let numMatch = src.match(/\d+/);
            if (numMatch) return numMatch[0];
        }
        if (/^\d+$/.test(input)) return input;
        return null;
    }

    if (hash) {
        cameraId = extractCameraId(hash);
        if (cameraId) {
            // Bangun WebSocket URL seperti dari halaman asli
            wsUrl = `wss://live.banyuwangikab.go.id/bjhsgfsgdfhjdgfyg3543g534g5y47856378fg8wetr783t4gw3yry/api/api/api/api/ws?src=CCTV${cameraId}`;
        }
    }

    if (!wsUrl) {
        cameraId = '349';
        wsUrl = `wss://live.banyuwangikab.go.id/bjhsgfsgdfhjdgfyg3543g534g5y47856378fg8wetr783t4gw3yry/api/api/api/api/ws?src=CCTV349`;
        console.warn('Tidak ada hash valid, menggunakan default CCTV349');
    }

    // DOM Elements
    const video = document.getElementById('videoPlayer');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const streamUrlDisplay = document.getElementById('streamUrlDisplay');
    const cameraIdLabel = document.getElementById('cameraIdLabel');
    const errorPanel = document.getElementById('errorPanel');
    const reloadBtn = document.getElementById('reloadBtn');

    cameraIdLabel.textContent = `CCTV${cameraId}`;
    streamUrlDisplay.innerHTML = `🔌 WebSocket<br><span style="font-size:11px; opacity:0.7;">${wsUrl}</span>`;

    let player = null;  // mpegts.js player instance

    function showError(msg) {
        errorPanel.innerHTML = `<div class="error-message">⚠️ ${msg}</div>`;
        statusDot.className = "status-dot disconnected";
        statusText.textContent = "Error / Terputus";
    }

    function clearError() {
        errorPanel.innerHTML = '';
    }

    function updateStatus(connected, loading = false) {
        if (loading) {
            statusText.textContent = "Menghubungkan WebSocket...";
            statusDot.className = "status-dot";
        } else if (connected) {
            statusText.textContent = "Streaming aktif (MPEG-TS)";
            statusDot.className = "status-dot";
        } else {
            statusText.textContent = "Terputus / Mencoba ulang";
            statusDot.className = "status-dot disconnected";
        }
    }

    function loadStream() {
        clearError();
        updateStatus(false, true);

        // Hentikan player lama jika ada
        if (player) {
            player.destroy();
            player = null;
        }
        // Kosongkan video
        video.pause();
        video.src = '';
        video.load();

        // Cek dukungan mpegts.js
        if (!mpegts || !mpegts.isSupported()) {
            showError("Browser tidak mendukung MPEG-TS (mpegts.js). Gunakan Chrome/Edge/Firefox.");
            return;
        }

        try {
            // Buat player mpegts.js dengan WebSocket sebagai source
            player = mpegts.createPlayer({
                type: 'mpegts',
                isLive: true,
                url: wsUrl,
                protocol: 'ws',      // WebSocket
                enableWorker: true,
                lazyLoad: false,
                reconnectInterval: 3000,
                reconnectAttempts: 5
            });

            player.attachMediaElement(video);
            player.load();

            player.on(mpegts.Events.MEDIA_INFO, () => {
                console.log("Media info diterima, stream siap");
                updateStatus(true, false);
                video.play().catch(e => console.warn("Autoplay gagal:", e));
            });

            player.on(mpegts.Events.ERROR, (err) => {
                console.error("mpegts error:", err);
                let msg = "Error decoder. Mungkin WebSocket tidak mengirim MPEG-TS.";
                if (err === mpegts.ErrorCodes.MEDIA_ERROR) msg += " Format video tidak dikenali.";
                showError(msg);
                updateStatus(false, false);
            });

            player.on(mpegts.Events.RECONNECT, () => {
                console.log("Mencoba reconnect...");
                statusText.textContent = "Reconnecting...";
            });

        } catch (err) {
            console.error("Gagal membuat player:", err);
            showError("Gagal inisialisasi player: " + err.message);
            updateStatus(false, false);
        }
    }

    function reloadStream() {
        loadStream();
    }

    reloadBtn.addEventListener('click', reloadStream);
    loadStream();
</script>
</body>
</html>
