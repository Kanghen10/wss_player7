<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CCTV Stream Player</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#videoContainer{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

#loading{
position:absolute;
color:white;
font-family:Arial, sans-serif;
font-size:18px;
}
</style>

</head>

<body>

<div id="videoContainer">
<div id="loading">Connecting CCTV...</div>
<video id="videoPlayer" autoplay muted playsinline></video>
</div>

<script>

const video = document.getElementById("videoPlayer")
const loading = document.getElementById("loading")

let queue = []
let sourceBuffer
let websocket
let started = false
let mediaSource
let reconnectDelay = 5000

function startStream(url){

mediaSource = new MediaSource()
video.src = URL.createObjectURL(mediaSource)

mediaSource.addEventListener("sourceopen", () => {
connectWS(url)
})

}

function connectWS(url){

websocket = new WebSocket(url)
websocket.binaryType = "arraybuffer"

websocket.onmessage = (event) => {

const data = new Uint8Array(event.data)

if(data[0] === 9){

const codec = new TextDecoder("utf-8").decode(data.slice(1))

sourceBuffer = mediaSource.addSourceBuffer(`video/mp4; codecs="${codec}"`)
sourceBuffer.mode = "segments"

sourceBuffer.addEventListener("updateend", processQueue)

}else{

appendSegment(event.data)

}

}

websocket.onerror = reconnect
websocket.onclose = reconnect

}

function appendSegment(segment){

if(!started){

sourceBuffer.appendBuffer(segment)
started = true

}else{

queue.push(segment)

if(!sourceBuffer.updating){
processQueue()
}

}

}

function processQueue(){

if(queue.length === 0) return
if(sourceBuffer.updating) return

const segment = queue.shift()
sourceBuffer.appendBuffer(segment)

}

function reconnect(){

loading.innerText = "Reconnecting..."

queue = []
started = false

setTimeout(() => {
location.reload()
}, reconnectDelay)

}

video.addEventListener("playing", () => {
loading.style.display = "none"
})

document.body.addEventListener("click", () => {

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}

})

const streamURL = location.hash.replace("#","")

if(streamURL){
startStream(streamURL)
}else{
loading.innerText = "No stream URL"
}

</script>

</body>
</html>
